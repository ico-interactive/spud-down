name: spud-down

services:
  bot:
    environment:
      DISCORD_TOKEN:
    build:
      context: ./bot
      dockerfile: ../Dockerfile
      tags:
        - spud-down-bot:latest
  api:
    profiles:
      - test
    environment:
      SL_API_KEY:
      SL_API_URL:
      SL_MOCK_API_URL:
      DL_API_URL:
    build:
      context: ./server
      dockerfile: ../Dockerfile
      tags:
        - spud-down-api:latest
